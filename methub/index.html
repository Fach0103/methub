<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MetHub — Explorador de la colección del Met</title>
  <meta name="description" content="Explora la colección abierta del Metropolitan Museum of Art." />

  
  <link rel="stylesheet" href="https://unpkg.com/7.css" />

 
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/navbar.css" />
  <link rel="stylesheet" href="css/icon-view.css" />
  <link rel="stylesheet" href="css/stats.css" />
  <link rel="stylesheet" href="css/states.css" />
  <link rel="stylesheet" href="css/placeholder.css" />
  <link rel="stylesheet" href="css/explore.css" />
  <link rel="stylesheet" href="css/departments.css" />
  <link rel="stylesheet" href="css/detail.css" />
  <link rel="stylesheet" href="css/compare.css" />
  <link rel="stylesheet" href="css/artist.css" />
</head>
<body class="win7-desktop">

  
  <div class="window glass active win7-window" id="win7-window">
    <div class="title-bar" id="win7-titlebar">
      <div class="title-bar-text" id="win7-title-text">MetHub — Página Principal</div>
      <div class="title-bar-controls">
        <button aria-label="Minimize" id="win7-btn-minimize"></button>
        <button aria-label="Maximize" id="win7-btn-maximize"></button>
        <button aria-label="Close" id="win7-btn-close" title="Volver al inicio"></button>
      </div>
    </div>

    <div class="window-body has-space win7-window-body" id="win7-window-body">
      <main id="app-main" class="app-main">
       
      </main>
    </div>

  
    <div class="status-bar">
      <p class="status-bar-field">Hecho por [Tu nombre] · 2026</p>
      <p class="status-bar-field">Datos: Open Access API del Metropolitan Museum of Art</p>
      <p class="status-bar-field">No afiliado al museo</p>
    </div>
  </div>

  <nav-bar></nav-bar>

  
  <script src="js/core/ApiClient.js"></script>
  <script src="js/core/MetService.js"></script>
  <script src="js/core/Router.js"></script>
  <script src="js/core/View.js"></script>

  
  <script src="js/components/NavBar.js"></script>
  <script src="js/components/LoadingState.js"></script>
  <script src="js/components/ErrorState.js"></script>

  
  <script src="js/views/HomeView.js"></script>
  <script src="js/views/ExploreView.js"></script>
  <script src="js/views/DetailView.js"></script>
  <script src="js/views/DepartmentsView.js"></script>
  <script src="js/views/ArtistView.js"></script>
  <script src="js/views/CompareView.js"></script>


  <script src="js/App.js"></script>
</body>
</html>
